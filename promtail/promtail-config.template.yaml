server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: apache_access_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: apache_access
          __path__: /var/log/nginx/*.access.log

    pipeline_stages:
      # 1. Фильтрация доверенных IP (динамическая из EXCLUDE_PATTERN)
      - drop:
          source: "line"
          expression: "${EXCLUDE_PATTERN}"

      # 2. Имя сайта из имени файла
      - regex:
          source: filename
          expression: '^.*/(?P<site>[^/]+)\.access\.log$'

      # 3. Парсинг Apache combined
      - regex:
          expression: '^(?P<ip>\S+) \S+ \S+ \[(?P<timestamp>[^\]]+)\] "(?P<method>\S+) (?P<request>\S+) \S+" (?P<status>\d+) (?P<bytes>\d+|-) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)"'

      - timestamp:
          source: timestamp
          format: "02/Jan/2006:15:04:05 -0700"

      - labels:
          ip:
          method:
          status:
          site:
          user_agent:
          bytes:

      - regex:
          source: request
          expression: '^(?P<path>[^?]*)(\?(?P<query>.*))?$'

      - labels:
          path:
    - job_name: apache_access_gz
    static_configs:
      - targets:
          - localhost
        labels:
          job: apache_access
          __path__: /var/log/nginx/*.access.log.*.gz
    pipeline_stages:
      # Распаковка gzip
      - decompress:
          format: gz

      # Далее все те же стадии, что и для обычных логов
      - drop:
          source: "line"
          expression: "${EXCLUDE_PATTERN}"

      - regex:
          source: filename
          expression: '^.*/(?P<site>[^/]+)\.access\.log\..*\.gz$'

      - regex:
          expression: '^(?P<ip>\S+) \S+ \S+ \[(?P<timestamp>[^\]]+)\] "(?P<method>\S+) (?P<request>\S+) \S+" (?P<status>\d+) (?P<bytes>\d+|-) "(?P<referer>[^"]*)" "(?P<user_agent>[^"]*)"'

      - timestamp:
          source: timestamp
          format: "02/Jan/2006:15:04:05 -0700"

      - labels:
          ip:
          method:
          status:
          site:
          user_agent:
          bytes:

      - regex:
          source: request
          expression: '^(?P<path>[^?]*)(\?(?P<query>.*))?$'

      - labels:
          path:
